[tox]
requires = tox-uv
env_list = typecheck, test, lint

[testenv]
deps =
    pyfakefs
    pytest
    pytest-subtests
commands =
    pytest {posargs}

[testenv:lint]
skip_install = true
deps =
    black
    isort
    flake8
    typer
    typer-di
commands =
    black --check src/ tests/
    isort --check src/ tests/
    flake8 src/ tests/

[testenv:typecheck]
deps =
    mypy
    pyfakefs
    pytest
    pytest-subtests
commands =
    mypy
